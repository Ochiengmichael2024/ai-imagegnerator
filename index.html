<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-wrapper">
        <div class="logo">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
        <h1 class="logo-title">AI image generator</h1>
      </div>
      <button class="theme-toggle">
        <i class="fa-solid fa-moon"></i>
      </button>
    </header>
    <div class="main-content">
      <form action="#" class="prompt-form">
        <div class="prompt-container">
          <textarea class="prompt-input" placeholder="Describe your imagination in detail..." required autofocus></textarea>
          <button class="prompt-btn">
            <i class="fa-solid fa-dice"></i>
          </button>
        </div>
        
        <!-- prompt actions/buttons -->
        <div class="prompt-actions">
         <div class="select-wrapper">
          <select class="custom-select">
           <option value="" selected disabled>Select model</option>
           <option value="black-forest-labs/FLUX.1-dev">FLUX</option>
           <option value="black-forest-labs/FLUX.1-schnell">FLUX 1-Schnell</option>
           <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion</option>
           <option value="runwayml/sta ble-diffusion-v1-5">Stable Diffusion v1.5</option>
           <option value="prompthero/openjourney">Openjourney</option>
          </select>
         </div>
            <div class="select-wrapper">
          <select class="custom-select">
           <option value="" selected disabled>Number of images</option>
           <option value="1">1 image</option>
           <option value="2">2 images</option>
           <option value="3">3 images</option>
           <option value="4">4 images</option>
          </select>
         </div>
         <div class="select-wrapper">
          <select class="custom-select">
           <option value="" selected disabled>Aspect ratio</option>
           <option value="1/1">Square (1:1)</option>
           <option value="16/9">Landscape(16:9)</option>
           <option value="9/16">Portrait (9:16)</option>
           <option value="runwayml/sta ble-diffusion-v1-5">Stable Diffusion v1.5</option>
           <option value="prompthero/openjourney">Openjourney</option>
          </select>
         </div>
<button type="submit" class="generate-btn"><i class="fa-solid fa-wand-magic-sparkles"></i>Generate</button>

        </div>
        <div class="gallery-grid">
          <div class="img-card">
            <img src="img/test.jpg" alt="" class="result-img">
            <div class="img-overlay">
              <button class="img-download-btn"><i class="fa-solid fa-download"></i></button>
            </div>
          </div>
          <div class="img-card">
            <img src="img/test.jpg" alt="" class="result-img">
            <div class="img-overlay">
              <button class="img-download-btn"><i class="fa-solid fa-download"></i></button>
            </div>
          </div>
          <div class="img-card">
            <img src="img/test.jpg" alt="" class="result-img">
            <div class="img-overlay">
              <button class="img-download-btn"><i class="fa-solid fa-download"></i></button>
            </div>
          </div>
          <div class="img-card">
            <img src="img/test.jpg" alt="" class="result-img">
            <div class="img-overlay">
              <button class="img-download-btn"><i class="fa-solid fa-download"></i></button>
            </div>
          </div>
          <div class="img-card">
            <img src="img/test.jpg" alt="" class="result-img">
            <div class="img-overlay">
              <button class="img-download-btn"><i class="fa-solid fa-download"></i></button>
            </div>
          </div>
          <div class="img-card">
            <img src="img/test.jpg" alt="" class="result-img">
            <div class="img-overlay">
              <button class="img-download-btn"><i class="fa-solid fa-download"></i></button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
